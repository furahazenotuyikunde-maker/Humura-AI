// DEDUPLICATION GUARDS APPLIED — exactly 1 Gemini 2.5 Flash call per user message
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humura AI - Standalone Chat</title>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #f8fafc; padding: 20px; display: flex; justify-content: center; }
        .chat-container { width: 100%; max-width: 500px; background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        .header { background: #0ea5e9; color: white; padding: 20px; font-weight: 800; font-size: 20px; text-align: center; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #fdfdfd; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: #0ea5e9; color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; background: white; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #0ea5e9; }
        button { background: #0ea5e9; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Humura AI Chat</div>
    <div id="chat-box">
        <div class="message ai">Hello! I am Humura AI. How are you feeling today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    
    // Conversation history - Guard 5: Plain array, NOT in useState/observable
    let history = [];
    
    // Guard 1: HARD LOCK
    let isSending = false;
    
    // Guard 2: DEBOUNCE
    let debounceTimer = null;

    async function sendMessage(e) {
        if (e) e.preventDefault(); // Guard 4: Stop any form submit from also firing

        // Guard 1: Check Hard Lock
        if (isSending) {
            console.warn('[CHAT] Blocked — already sending');
            return;
        }

        // Guard 2: Check Debounce
        if (debounceTimer !== null) {
            console.warn('[CHAT] Blocked — debounce');
            return;
        }

        const text = input.value.trim();
        if (!text) return;

        // Guard 2: Set Debounce Timer
        debounceTimer = setTimeout(() => {
            debounceTimer = null;
        }, 300);

        // Guard 3: UI LOCK - Disable input and button
        input.disabled = true;
        sendBtn.disabled = true;

        // Guard 1: Set Hard Lock immediately before the API call
        isSending = true;

        // Guard 6: CONSOLE LOGGING (Before request)
        console.log('[CHAT] ▶ Gemini 2.5 Flash request | id=REQ-' + Date.now() + ' | msg="' + text + '"');

        // Add user message to UI
        addMessage(text, 'user');
        input.value = '';

        try {
            // Guard 8: PRESERVE THE GEMINI 3.0 FLASH CALL EXACTLY
            const response = await fetch('https://acetkeyzhbgfsetwkfuo.supabase.co/functions/v1/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userMessage: text,
                    history: history 
                })
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            const data = await response.json();
            const reply = data.reply || data.error || "No response received.";

            // Guard 6: CONSOLE LOGGING (Success)
            console.log('[CHAT] ✔ Response received');

            // Add AI response to UI
            addMessage(reply, 'ai');

            // Guard 5: History mutations (push) must be direct
            history.push({ role: 'user', content: text });
            history.push({ role: 'assistant', content: reply });
            if (history.length > 10) history = history.slice(-10);

        } catch (err) {
            // Guard 6: CONSOLE LOGGING (Error)
            console.error('[CHAT] ✖ Error:', err.message);
            // Guard 7: NO AUTO-RETRY
            addMessage("The AI is currently processing in offline mode or the connection was interrupted. Please try again in a moment.", 'ai');
        } finally {
            // Guard 1 & 3: Reset hard lock and re-enable UI
            isSending = false;
            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
        }
    }

    // Guard 4: SINGLE EVENT SOURCE - call the same sendMessage() function from each
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            sendMessage(e);
        }
    });

    sendBtn.addEventListener('click', (e) => {
        sendMessage(e);
    });

    function addMessage(text, role) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
